services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root2k3
      MYSQL_DATABASE: moynul
      MYSQL_USER: moynul
      MYSQL_PASSWORD: moynul2k3
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - outdoorda_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      MYSQL_ROOT_PASSWORD: root2k3
    ports:
      - "3300:80"
    depends_on:
      - mariadb
    networks:
      - outdoorda_net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - outdoorda_net

  nginx:
    image: nginx:1.27-alpine
    container_name: outdoorda_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/conf.d/petdoorusa.com.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - outdoorda_net


volumes:
  mariadb_data:
  redis_data:

networks:
  outdoorda_net:
    driver: bridge
